<svg viewBox="0 0 500 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a8ddb"/>
      <stop offset="1" stop-color="#13528f"/>
    </linearGradient>
    <radialGradient id="disc" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.78" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#e7e7e7"/>
    </radialGradient>
  </defs>

  <!-- light circular backdrop -->
  <circle cx="250" cy="186" r="178" fill="url(#disc)"/>

  <!-- blue orbit ribbon sweeping around the scene -->
  <path d="M72 250
           C 96 348, 274 366, 366 298
           C 426 252, 420 150, 360 110
           L346 130
           C 398 166, 402 248, 348 290
           C 264 346, 110 330, 94 247
           Z" fill="url(#blue)"/>

  <!-- minaret (left) -->
  <g stroke="#5b6470" stroke-width="2" stroke-linejoin="round">
    <rect x="111" y="118" width="28" height="140" fill="#fcfcfc"/>
    <rect x="104" y="252" width="42" height="14" fill="#ececec"/>
    <rect x="104" y="186" width="42" height="11" fill="#e4e4e4"/>
    <rect x="107" y="150" width="36" height="9" fill="#eeeeee"/>
    <rect x="116" y="78" width="18" height="42" fill="#fcfcfc"/>
    <path d="M114 80 Q125 52 136 80 Z" fill="#f0c33c" stroke="none"/>
    <path d="M125 44 a8 8 0 1 0 5 13 a6 6 0 1 1 -5 -13 Z" fill="#f0c33c" stroke="none"/>
  </g>

  <!-- Madinah-style dome (dark) -->
  <path d="M210 236 Q210 150 250 132 Q290 150 290 236 Z" fill="#173b4a"/>
  <line x1="250" y1="132" x2="250" y2="104" stroke="#173b4a" stroke-width="5"/>
  <path d="M250 100 a6 6 0 1 0 4 10 a4.5 4.5 0 1 1 -4 -10 Z" fill="#f0c33c"/>

  <!-- crescent + star (gold) -->
  <g fill="#f0b400">
    <path d="M302 96 a19 19 0 1 0 9 31 a14.5 14.5 0 1 1 -9 -31 Z"/>
    <path d="M330 92 l3.5 7 7.5 1 -5.5 5.5 1.5 7.6 -7-3.6 -7 3.6 1.5 -7.6 -5.5 -5.5 7.5 -1 Z"/>
  </g>

  <!-- airplane (dark, climbing to the right) -->
  <g fill="#202b36" transform="rotate(-15 340 112)">
    <rect x="306" y="108" width="70" height="9" rx="4.5"/>
    <path d="M335 115 L322 139 L336 139 L354 116 Z"/>
    <path d="M312 115 L302 132 L312 132 L326 117 Z"/>
    <path d="M310 110 L304 96 L312 96 L319 109 Z"/>
  </g>

  <!-- Kaaba (front, bottom centre) -->
  <rect x="206" y="206" width="88" height="62" fill="#141414"/>
  <rect x="206" y="223" width="88" height="11" fill="#d4af37"/>
  <rect x="242" y="241" width="16" height="27" fill="#c9a23a"/>

  <!-- wordmark -->
  <text x="250" y="408" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="66" font-weight="700" fill="#1a2a8a" letter-spacing="2">MOKBUL</text>
  <text x="250" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#141414" letter-spacing="0.5">HAJJ OVERSEAS SERVICE</text>
</svg>
