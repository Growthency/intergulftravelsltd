<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06402b"/>
      <stop offset="0.5" stop-color="#0a6248"/>
      <stop offset="1" stop-color="#0e7c5a"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e7c97a" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#c9a24b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="260" fill="url(#orb)"/>
  <!-- geometric grid -->
  <g opacity="0.07" stroke="#e7c97a" stroke-width="1.5">
    <path d="M0 0 L1200 0" transform="translate(0,0)"/>
  </g>
  <!-- crescent + star -->
  <g transform="translate(1000 130)">
    <circle cx="0" cy="0" r="60" fill="#e7c97a"/>
    <circle cx="20" cy="-10" r="50" fill="#0a6248"/>
    <path d="M86 -6 l7 15 16 2 -12 11 3 16 -14 -8 -14 8 3 -16 -12 -11 16 -2 Z" fill="#e7c97a"/>
  </g>

  <!-- badge -->
  <g transform="translate(70 92)">
    <rect x="0" y="0" width="560" height="56" rx="28" fill="rgba(255,255,255,0.06)" stroke="#e7c97a" stroke-opacity="0.45"/>
    <text x="30" y="37" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" letter-spacing="2" fill="#e7c97a">HAJJ LICENSE NO. 071 · SINCE 2002</text>
  </g>

  <!-- title -->
  <text x="70" y="330" font-family="'Times New Roman', Georgia, serif" font-size="92" font-weight="700" fill="#ffffff">Inter Gulf Travels Ltd</text>
  <text x="70" y="398" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#ffffff" opacity="0.85">Trusted Hajj &amp; Umrah from Bangladesh</text>

  <!-- footer row -->
  <text x="70" y="556" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#e7c97a">intergulftravelsltd.com</text>
  <text x="430" y="556" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#ffffff" opacity="0.6">Direct flights · Hotels near the Haram · Bangla-speaking guides</text>
</svg>
